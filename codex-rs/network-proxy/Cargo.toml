[package]
name = "codex-network-proxy"
edition = "2024"

[lib]
name = "codex_network_proxy"
path = "src/lib.rs"

[lints]
workspace = true

[package.version]
workspace = true

[package.license]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.clap]
version = "4"
features = [ "derive",]

[dependencies.chrono]
version = "0.4.43"

[dependencies.codex-utils-absolute-path]
workspace = true

[dependencies.codex-utils-home-dir]
workspace = true

[dependencies.codex-utils-rustls-provider]
workspace = true

[dependencies.globset]
workspace = true

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.thiserror]
version = "2.0.17"

[dependencies.time]
workspace = true

[dependencies.tokio]
version = "1"
features = [ "full",]

[dependencies.tracing]
version = "0.1.44"

[dependencies.url]
version = "2"

[dependencies.rama-core]
version = "=0.3.0-alpha.4"

[dependencies.rama-http]
version = "=0.3.0-alpha.4"

[dependencies.rama-http-backend]
version = "=0.3.0-alpha.4"
features = [ "tls",]

[dependencies.rama-net]
version = "=0.3.0-alpha.4"
features = [ "http", "tls",]

[dependencies.rama-socks5]
version = "=0.3.0-alpha.4"

[dependencies.rama-tcp]
version = "=0.3.0-alpha.4"
features = [ "http",]

[dependencies.rama-tls-rustls]
version = "=0.3.0-alpha.4"
features = [ "http",]

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.tempfile]
workspace = true

[target."cfg(target_family = \"unix\")".dependencies.rama-unix]
version = "=0.3.0-alpha.4"
