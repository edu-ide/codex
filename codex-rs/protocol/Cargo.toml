[package]
name = "codex-protocol"

[lib]
name = "codex_protocol"
path = "src/lib.rs"

[lints]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[package.version]
workspace = true

[dependencies.codex-execpolicy]
workspace = true

[dependencies.codex-utils-absolute-path]
workspace = true

[dependencies.codex-utils-image]
workspace = true

[dependencies.codex-utils-string]
workspace = true

[dependencies.codex-utils-template]
workspace = true

[dependencies.icu_decimal]
workspace = true

[dependencies.icu_locale_core]
workspace = true

[dependencies.icu_provider]
workspace = true
features = [ "sync",]

[dependencies.quick-xml]
workspace = true
features = [ "serialize",]

[dependencies.schemars]
version = "0.8.22"

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.serde_with]
workspace = true
features = [ "macros", "base64",]

[dependencies.strum]
workspace = true

[dependencies.strum_macros]
workspace = true

[dependencies.sys-locale]
workspace = true

[dependencies.tracing]
version = "0.1.44"

[dependencies.ts-rs]
workspace = true
features = [ "uuid-impl", "serde-json-impl", "no-serde-warnings",]

[dependencies.uuid]
version = "1"
features = [ "serde", "v7", "v4",]

[dev-dependencies.anyhow]
workspace = true

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.tempfile]
workspace = true

[package.metadata.cargo-shear]
ignored = [ "icu_provider", "strum",]

[dependencies.chardetng]
workspace = true

[dependencies.encoding_rs]
workspace = true

[dependencies.globset]
workspace = true

[dependencies.thiserror]
workspace = true

[dependencies.chrono]
workspace = true
features = ["serde"]

[dependencies.reqwest]
workspace = true

[dependencies.tokio]
workspace = true

[target.'cfg(target_os = "linux")'.dependencies.seccompiler]
workspace = true

[target.'cfg(target_os = "linux")'.dependencies.landlock]
workspace = true

[dependencies.codex-network-proxy]
workspace = true

[dependencies.codex-async-utils]
workspace = true
