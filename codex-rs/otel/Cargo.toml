[package]
name = "codex-otel"

[lib]
doctest = false
name = "codex_otel"
path = "src/lib.rs"

[lints]
workspace = true

[features]
disable-default-metrics-exporter = []

[package.version]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[dependencies.chrono]
version = "0.4.43"

[dependencies.codex-utils-absolute-path]
workspace = true

[dependencies.codex-utils-string]
workspace = true

[dependencies.codex-api]
workspace = true

[dependencies.codex-app-server-protocol]
workspace = true

[dependencies.codex-protocol]
workspace = true

[dependencies.eventsource-stream]
workspace = true

[dependencies.gethostname]
workspace = true

[dependencies.opentelemetry]
workspace = true
features = [ "logs", "metrics", "trace",]

[dependencies.opentelemetry-appender-tracing]
workspace = true

[dependencies.opentelemetry-otlp]
workspace = true
features = [ "grpc-tonic", "http-proto", "http-json", "logs", "metrics", "trace", "reqwest-blocking-client", "reqwest-rustls", "tls", "tls-roots",]

[dependencies.opentelemetry-semantic-conventions]
workspace = true

[dependencies.opentelemetry_sdk]
workspace = true
features = [ "experimental_trace_batch_span_processor_with_async_runtime", "experimental_metrics_custom_reader", "logs", "metrics", "rt-tokio", "testing", "trace",]

[dependencies.http]
workspace = true

[dependencies.os_info]
workspace = true

[dependencies.reqwest]
workspace = true
features = [ "blocking", "rustls-tls",]

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.strum_macros]
workspace = true

[dependencies.thiserror]
version = "2.0.17"

[dependencies.tokio]
version = "1"

[dependencies.tokio-tungstenite]
workspace = true

[dependencies.tracing]
version = "0.1.44"

[dependencies.tracing-opentelemetry]
workspace = true

[dependencies.tracing-subscriber]
version = "0.3.22"

[dev-dependencies.opentelemetry_sdk]
workspace = true
features = [ "experimental_metrics_custom_reader", "testing",]

[dev-dependencies.pretty_assertions]
workspace = true
