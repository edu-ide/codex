[[bin]]
name = "codex-execve-wrapper"
path = "src/bin/main_execve_wrapper.rs"

[package]
name = "codex-shell-escalation"

[package.edition]
workspace = true

[package.license]
workspace = true

[package.version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.async-trait]
workspace = true

[dependencies.clap]
version = "4"
features = [ "derive",]

[dependencies.codex-protocol]
workspace = true

[dependencies.codex-utils-absolute-path]
workspace = true

[dependencies.libc]
workspace = true

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.socket2]
workspace = true
features = [ "all",]

[dependencies.tokio]
version = "1"
features = [ "io-std", "net", "macros", "process", "rt-multi-thread", "signal", "time",]

[dependencies.tokio-util]
version = "0.7.18"

[dependencies.tracing]
version = "0.1.44"

[dependencies.tracing-subscriber]
version = "0.3.22"
features = [ "env-filter", "fmt",]

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.tempfile]
workspace = true
