[[bin]]
name = "codex-tui"
path = "src/main.rs"

[[bin]]
name = "md-events"
path = "src/bin/md-events.rs"

[package]
name = "codex-tui"
autobins = false

[lib]
name = "codex_tui"
path = "src/lib.rs"

[features]
default = [ "voice-input",]
vt100-tests = []
debug-logs = []
voice-input = [ "dep:cpal",]

[lints]
workspace = true

