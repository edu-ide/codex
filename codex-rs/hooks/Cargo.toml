[package]
name = "codex-hooks"

[lib]
doctest = false
name = "codex_hooks"
path = "src/lib.rs"

[lints]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[package.version]
workspace = true

[dependencies.anyhow]
workspace = true

[dependencies.chrono]
version = "0.4.43"
features = [ "serde",]

[dependencies.codex-config]
workspace = true

[dependencies.codex-protocol]
workspace = true

[dependencies.futures]
version = "0.3"
default-features = false
features = [ "alloc",]

[dependencies.regex]
workspace = true

[dependencies.schemars]
version = "0.8.22"

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.tokio]
version = "1"
features = [ "io-util", "process", "time",]

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.tempfile]
workspace = true

[dev-dependencies.tokio]
version = "1"
features = [ "macros", "rt-multi-thread", "time",]
