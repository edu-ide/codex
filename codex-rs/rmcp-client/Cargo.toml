[package]
name = "codex-rmcp-client"

[lints]
workspace = true

[dependencies]
anyhow = "1"
oauth2 = "5"
sse-stream = "0.2.1"

[package.version]
workspace = true

[package.edition]
workspace = true

[package.license]
workspace = true

[dependencies.axum]
version = "0.8"
default-features = false
features = [ "http1", "tokio",]

[dependencies.codex-client]
workspace = true

[dependencies.codex-keyring-store]
workspace = true

[dependencies.codex-protocol]
workspace = true

[dependencies.codex-utils-pty]
workspace = true

[dependencies.codex-utils-home-dir]
workspace = true

[dependencies.futures]
version = "0.3"
default-features = false
features = [ "std",]

[dependencies.keyring]
workspace = true
features = [ "crypto-rust",]

[dependencies.reqwest]
version = "0.12"
default-features = false
features = [ "json", "stream", "rustls-tls",]

[dependencies.rmcp]
version = "0.15.0"
default-features = false
features = [ "auth", "base64", "client", "macros", "schemars", "server", "transport-child-process", "transport-streamable-http-client-reqwest", "transport-streamable-http-server",]

[dependencies.schemars]
version = "0.8.22"

[dependencies.serde]
version = "1"
features = [ "derive",]

[dependencies.serde_json]
workspace = true

[dependencies.sha2]
workspace = true

[dependencies.thiserror]
version = "2.0.17"

[dependencies.tiny_http]
workspace = true

[dependencies.tokio]
version = "1"
features = [ "io-util", "macros", "process", "rt-multi-thread", "sync", "io-std", "time",]

[dependencies.tracing]
version = "0.1.44"
features = [ "log",]

[dependencies.urlencoding]
workspace = true

[dependencies.webbrowser]
workspace = true

[dependencies.which]
workspace = true

[dev-dependencies.codex-utils-cargo-bin]
workspace = true

[dev-dependencies.pretty_assertions]
workspace = true

[dev-dependencies.serial_test]
workspace = true

[dev-dependencies.tempfile]
workspace = true

[target."cfg(target_os = \"linux\")".dependencies.keyring]
workspace = true
features = [ "linux-native-async-persistent",]

[target."cfg(target_os = \"macos\")".dependencies.keyring]
workspace = true
features = [ "apple-native",]

[target."cfg(target_os = \"windows\")".dependencies.keyring]
workspace = true
features = [ "windows-native",]

[target."cfg(any(target_os = \"freebsd\", target_os = \"openbsd\"))".dependencies.keyring]
workspace = true
features = [ "sync-secret-service",]
